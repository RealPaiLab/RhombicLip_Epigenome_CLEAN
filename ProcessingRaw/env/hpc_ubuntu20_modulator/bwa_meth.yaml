- name: bwa-meth
  version: 0.2.7
  build_type: custom
  build_args:
    steps:
      - build_type: conda
        build_args:
          package: bwameth
          version: 0.2.7
          channels:
            - conda-forge
            - bioconda
      - build_type: conda
        build_args:
          package: samtools
          version: 1.15
          channels:
            - conda-forge
            - bioconda
      - build_type: conda
        build_args:
          package: bwa
          version: 0.7.17
          channels:
            - conda-forge
            - bioconda
  depends:
    - name: conda
      version: 4.11.0
      required_at: build

