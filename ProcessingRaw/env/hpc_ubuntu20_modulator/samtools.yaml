- name: samtools
  version: 1.15
  build_type: custom
  build_args:
    prereq_args:
      prereq_args:
        md5: 69a7549c3dbbe1f879c5bc48403e82b3
        url: https://github.com/samtools/samtools/releases/download/1.15/samtools-1.15.tar.bz2
      prereq_type: download
    prereq_type: extract
    steps:
    - command: ["{build_dir}/configure", "--prefix={output_dir}"]
    - command: ["make"]
    - command: ["make", "install"]
    - build_type: copy
      build_args:
        from: samtools
        to: bin/samtools
        executable: true

